services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: facet
      POSTGRES_PASSWORD: facet
      POSTGRES_DB: facet
    ports:
      - "5432:5432"
    volumes:
      - facet_pg:/var/lib/postgresql/data

  game-server:
    build:
      context: ..
      dockerfile: infra/Dockerfile.game-server
    ports:
      - "2567:2567"
    environment:
      COLYSEUS_PORT: 2567
      DATABASE_URL: postgres://facet:facet@postgres:5432/facet
    depends_on:
      - postgres

volumes:
  facet_pg:
